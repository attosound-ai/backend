_format_version: "3.0"
_transform: true

# ── Services & Routes ──

services:
  # AUTH routes → User Service (Go)
  - name: auth-service
    url: http://user-service:8080/auth
    routes:
      - name: auth-routes
        paths:
          - /api/v1/auth
        strip_path: true
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS

  # FOLLOW / FOLLOWERS / FOLLOWING routes → Social Service (NestJS)
  - name: user-social-service
    url: http://social-service:3000
    routes:
      - name: user-social-routes
        paths:
          - ~/api/v1/users/[^/]+/(follow|followers|following)
        strip_path: false
        methods:
          - GET
          - POST
          - DELETE
          - OPTIONS

  # USERS routes → User Service (Go)
  - name: user-service
    url: http://user-service:8080/users
    routes:
      - name: user-routes
        paths:
          - /api/v1/users
        strip_path: true
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS

  # POSTS & FEED routes → Social Service (NestJS)
  - name: posts-service
    url: http://social-service:3000/api/v1/posts
    routes:
      - name: post-routes
        paths:
          - /api/v1/posts
        strip_path: true
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS

  # NOTIFICATIONS routes → Social Service (NestJS)
  - name: notification-service
    url: http://social-service:3000/api/v1/notifications
    routes:
      - name: notification-routes
        paths:
          - /api/v1/notifications
        strip_path: true
        methods:
          - GET
          - POST
          - PATCH
          - OPTIONS

  # MESSAGES routes → Chat Service (Elixir/Phoenix)
  - name: chat-service
    url: http://chat-service:4000/api/v1/messages
    routes:
      - name: message-routes
        paths:
          - /api/v1/messages
        strip_path: true
        methods:
          - GET
          - POST
          - OPTIONS

  # WebSocket → Chat Service root (Phoenix expects /socket/websocket)
  - name: chat-websocket
    url: http://chat-service:4000
    routes:
      - name: websocket-routes
        paths:
          - /socket
        strip_path: false

  # MEDIA routes → Content Service (Rust)
  - name: media-service
    url: http://content-service:8081
    routes:
      - name: media-routes
        paths:
          - /api/v1/media
        strip_path: false
        methods:
          - GET
          - POST
          - DELETE
          - OPTIONS

  # CONTENT routes → Content Service (Rust)
  - name: content-service
    url: http://content-service:8081
    routes:
      - name: content-routes
        paths:
          - /api/v1/content
        strip_path: false
        methods:
          - GET
          - POST
          - DELETE
          - OPTIONS

  # OTP routes → OTP Service (Go)
  - name: otp-service
    url: http://otp-service:8000/otp
    routes:
      - name: otp-routes
        paths:
          - /api/v1/otp
        strip_path: true
        methods:
          - POST
          - OPTIONS

  # PAYMENT routes → Payment Service (Python)
  - name: payment-service
    url: http://payment-service:8000/payments
    routes:
      - name: payment-routes
        paths:
          - /api/v1/payments
        strip_path: true
        methods:
          - GET
          - POST
          - DELETE
          - OPTIONS

  # TELEPHONY webhooks → direct (no JWT, validated by Twilio signature)
  - name: telephony-webhooks
    url: http://telephony-service:3009/telephony/webhooks
    routes:
      - name: telephony-webhook-routes
        paths:
          - /api/v1/telephony/webhooks
        strip_path: true
        methods:
          - POST
          - OPTIONS

  # TELEPHONY API → authenticated
  - name: telephony-service
    url: http://telephony-service:3009/telephony
    routes:
      - name: telephony-api-routes
        paths:
          - /api/v1/telephony
        strip_path: true
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
      - name: telephony-ws-routes
        paths:
          - /telephony/media-stream
        strip_path: false
        protocols:
          - http
          - https

# ── Global Plugins ──

plugins:
  # CORS - Allow frontend to communicate
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
        - Accept
        - X-Request-ID
        - X-User-ID
        - X-Twilio-Signature
      exposed_headers:
        - X-Request-ID
      credentials: true
      max_age: 3600

  # Rate Limiting - Protect against abuse
  - name: rate-limiting
    config:
      minute: 120
      hour: 5000
      policy: local
      fault_tolerant: true
      hide_client_headers: false

  # Request ID - Distributed tracing correlation
  - name: correlation-id
    config:
      header_name: X-Request-ID
      generator: uuid
      echo_downstream: true
